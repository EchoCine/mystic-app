<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="玄学趋吉避凶 - 八字、奇门遁甲">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Mystic App">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mystic App - 玄学趋吉避凶</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F5F0E8;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #F5F0E8;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #2B5F8A;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      color: #2B5F8A;
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">正在加载 Mystic App...</div>
  </div>
  
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: "1.0.0",
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            canvasKitBaseUrl: "https://www.gstatic.com/flutter-canvaskit/0b3973a9162be4f140ba40f8c4c2bd97",
          }).then(function(appRunner) {
            appRunner.runApp();
            document.getElementById('loading').classList.add('hidden');
          });
        }
      });
    });
  </script>
</body>
</html>
